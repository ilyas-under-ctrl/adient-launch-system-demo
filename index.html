// Part Number → BOM modal
function getActiveBomVersion(projectId, fgpn) {
  return (state.bomVersions || []).find(item => item.projectId === projectId && item.fgpn === fgpn && item.status === 'Active') || null;
}

function getActiveBomLines(projectId, fgpn) {
  const active = getActiveBomVersion(projectId, fgpn);
  return active ? (state.bomData || []).filter(item => item.projectId === projectId && item.fgpn === fgpn && item.versionId === active.id) : [];
}

function getProjectPartNumbers(projectId) {
  const partMap = new Map();
  state.pos.filter(po => po.project === projectId).forEach(po => {
    (po.parts || [{ fgpn:po.fgpn, desc:'-', qty:po.qty }]).forEach(part => {
      const current = partMap.get(part.fgpn) || { fgpn:part.fgpn, description:part.desc || '-', poIds:new Set(), orderedQty:0 };
      current.poIds.add(po.id);
      current.orderedQty += Number(part.qty || 0);
      partMap.set(part.fgpn, current);
    });
  });
  return [...partMap.values()].map(item => ({ ...item, poIds:[...item.poIds] }));
}

function renderProjectBom(projectId) {
  const query = (state.bomSearchQuery || '').trim().toLowerCase();
  const statusFilter = state.bomStatusFilter || 'all';
  const allParts = getProjectPartNumbers(projectId);
  const parts = allParts.filter(part => {
    const active = getActiveBomVersion(projectId, part.fgpn);
    return (!query || `${part.fgpn} ${part.description} ${part.poIds.join(' ')}`.toLowerCase().includes(query)) &&
      (statusFilter === 'all' || (statusFilter === 'active' && active) || (statusFilter === 'missing' && !active));
  });
  const activeCount = allParts.filter(part => getActiveBomVersion(projectId, part.fgpn)).length;
  const canUpload = canEditProject(projectId);
  return `
    <div class="page-header flex-between" style="padding:0; margin-bottom:16px">
      <div><h2 class="card-title" style="margin:0">Part Number BOMs</h2><p class="page-subtitle" style="margin:4px 0 0">Each FGPN has one active BOM in ${projectId}. Previous versions remain read-only.</p></div>
      <span class="badge ${activeCount === allParts.length ? 'green' : 'orange'}">${activeCount} of ${allParts.length} ready</span>
    </div>
    <div class="overview-panel" style="margin-bottom:16px"><div class="flex-between" style="gap:12px; flex-wrap:wrap">

    <div style="display:flex; flex-direction:column; gap:10px">
      ${parts.length ? parts.map(part => {
        const active = getActiveBomVersion(projectId, part.fgpn);

  const activeVersion = getActiveBomVersion(projectId, fgpn);
  const boms = getActiveBomLines(projectId, fgpn);

  const partQty = part ? part.qty : null;

  content.innerHTML = `

function actionUploadBOMForPart(fgpn, projectId) {
  if (!requireProjectWriteAccess(projectId)) return;
  const input = document.getElementById('bom-upload-file');
  if (!input || !input.files || input.files.length === 0) {
    alert('Choose a BOM spreadsheet before uploading.');
    return;
  }
  showLoading(`Validating BOM for ${fgpn}...`, () => {
    const versions = (state.bomVersions || []).filter(item => item.projectId === projectId && item.fgpn === fgpn);
    versions.filter(item => item.status === 'Active').forEach(item => item.status = 'Superseded');
    const nextVersion = Math.max(0, ...versions.map(item => item.version)) + 1;
    const versionId = `BOM-${projectId}-${fgpn}-V${nextVersion}`;
    const now = new Date().toLocaleString('en-GB');
    state.bomVersions.push({ id:versionId, projectId, fgpn, version:nextVersion, status:'Active', file:input.files[0].name, uploadedBy:state.currentUserName, uploadedAt:now, activatedAt:now });
    const sourceLines = (state.bomData || []).filter(item => item.projectId === projectId && item.fgpn === fgpn);
    const templateLines = sourceLines.length ? sourceLines.slice(-2) : [{ component:'NEW-MAT-01', componentDesc:'Validated imported material', qtyPerUnit:1, uom:'unit' }];
    templateLines.forEach(line => state.bomData.push({ ...line, projectId, fgpn, versionId }));
    (state.savedLaunchPlans || []).filter(plan => plan.projectId === projectId && !plan.deliveryCode && plan.meetingDecision !== 'approved' && plan.lines.some(line => line.fgpn === fgpn)).forEach(plan => plan.status = 'bom_stale');
    closeModal();
    alert(`BOM for ${fgpn} uploaded successfully. Version ${nextVersion} is now active in ${projectId}.`);
    if (typeof logAudit === 'function') logAudit('BOM uploaded', fgpn, 'active version', 'part number BOM');
    renderPageContent();
  });
}

function evaluateLaunchPlan(projectPOs) {
  const selectedIds = state.launchSelectedPOs || [];
  const selectedPOs = projectPOs.filter(po => selectedIds.includes(po.id));
  const lineResults = {};
  const materialDemand = {};
  const issues = [];
  let totalQty = 0;

  selectedPOs.forEach(po => {
    const parts = po.parts || [{ fgpn: po.fgpn, desc: '-', qty: po.qty, launched: po.launchedQty }];
    parts.forEach(pt => {
      const key = po.id + '__' + pt.fgpn;
      const remaining = Math.max(0, pt.qty - pt.launched);
      const qty = state.launchSimQty[key] !== undefined ? Number(state.launchSimQty[key]) : remaining;

      if (remaining === 0) {
        lineResults[key] = { feasible: true, complete: true, message: 'Already fully launched', components: [] };
        return;
      }
      if (!Number.isFinite(qty) || qty <= 0) {
        lineResults[key] = { feasible: false, message: 'Enter a quantity greater than 0.', components: [] };
        issues.push(`${po.id} / ${pt.fgpn}: enter a quantity greater than 0.`);
        return;
      }
      if (qty > remaining) {
        lineResults[key] = { feasible: false, message: `Maximum available to launch is ${remaining} units.`, components: [] };
        issues.push(`${po.id} / ${pt.fgpn}: reduce the quantity to ${remaining} units or less.`);
        return;
      }

      const boms = getActiveBomLines(po.project, pt.fgpn);
      if (boms.length === 0) {
        lineResults[key] = { feasible: false, message: 'BOM missing. Upload a BOM for this part number.', components: [] };
        issues.push(`${po.id} / ${pt.fgpn}: upload the missing BOM.`);
        return;
      }

      const components = boms.map(b => b.component);
      lineResults[key] = { feasible: true, message: 'Materials available', components };
      totalQty += qty;
      boms.forEach(b => {
        materialDemand[b.component] = (materialDemand[b.component] || 0) + (b.qtyPerUnit * qty);
      });
    });
  });

  Object.entries(materialDemand).forEach(([materialId, required]) => {
    const material = state.stock.find(item => item.id === materialId);
    const available = material ? material.practical : 0;
    if (required > available) {
      const shortage = Math.ceil(required - available);
      issues.push(`${materialId}: ${Math.ceil(required)} required, ${available} available. Receive or release ${shortage} more units.`);
      Object.values(lineResults).forEach(result => {
        if (result.components && result.components.includes(materialId)) {
          result.feasible = false;
          result.message = `${materialId} shortage: need ${Math.ceil(required)}, have ${available}. Add ${shortage} units.`;
        }
      });
    }
  });

  return {
    selectedCount: selectedPOs.length,
    totalQty,
    lineResults,
    materialDemand,
    issues: [...new Set(issues)],
    feasible: selectedPOs.length > 0 && totalQty > 0 && issues.length === 0
  };
}

function renderLaunchLineResult(result, isSelected, isComplete) {
  if (isComplete) return '<span class="badge green">Complete</span>';
  if (!isSelected) return '<span class="badge grey">Select PO</span>';
  if (!result) return '<span class="badge grey">Enter quantity</span>';
  if (result.feasible) return `<span class="badge green">Feasible</span><div style="font-size:11px; color:var(--green); margin-top:4px">${result.message}</div>`;
  return `<span class="badge red">Blocked</span><div style="font-size:11px; color:var(--red); margin-top:4px; line-height:1.35">${result.message}</div>`;
}

function renderLaunchDecision(plan) {
  const tone = plan.feasible ? 'green' : plan.selectedCount > 0 ? 'red' : 'grey';
  const color = plan.feasible ? 'var(--green)' : plan.selectedCount > 0 ? 'var(--red)' : 'var(--text-secondary)';
  const background = plan.feasible ? 'var(--green-soft)' : plan.selectedCount > 0 ? 'var(--red-soft)' : 'var(--bg-subtle)';
  const border = plan.feasible ? 'rgba(28,122,76,.25)' : plan.selectedCount > 0 ? 'rgba(193,59,62,.25)' : 'var(--border)';
  const title = plan.feasible ? 'Launch plan is feasible' : plan.selectedCount > 0 ? 'Launch plan is blocked' : 'Build a launch plan';
  const message = plan.feasible
    ? `${plan.selectedCount} PO${plan.selectedCount > 1 ? 's' : ''} selected, ${plan.totalQty} units ready to launch.`
    : plan.selectedCount > 0
      ? plan.issues.slice(0, 3).map(issue => `<div style="margin-top:4px">${issue}</div>`).join('')
      : 'Select one or more POs below. You can launch a partial quantity for every part number.';

  return `
    <div style="display:flex; align-items:center; justify-content:space-between; gap:20px; padding:16px 18px; margin-bottom:18px; border:1px solid ${border}; border-left:4px solid ${color}; border-radius:8px; background:${background}">
      <div style="min-width:0">
        <div style="display:flex; align-items:center; gap:9px; color:${color}; font-weight:700">
          <span class="badge ${tone}">${plan.feasible ? 'READY' : plan.selectedCount > 0 ? 'BLOCKED' : 'WAITING'}</span>
          <span>${title}</span>
        </div>
        <div style="font-size:12px; color:var(--text-secondary); margin-top:7px; line-height:1.4">${message}</div>
      </div>
      <button class="btn btn-primary" ${plan.feasible ? '' : 'disabled'} style="min-width:190px; justify-content:center; background:${plan.feasible ? 'var(--green)' : '#94a3b8'}; border-color:${plan.feasible ? 'var(--green)' : '#94a3b8'}; opacity:${plan.feasible ? '1' : '.72'}; cursor:${plan.feasible ? 'pointer' : 'not-allowed'}" onclick="actionCommitSelectedLaunch()">Launch ${plan.totalQty > 0 ? plan.totalQty + ' units' : 'selected plan'}</button>
    </div>
  `;
}

function toggleLaunchPO(poId, checked) {
  const targetPO = state.pos.find(item => item.id === poId);
  if (!targetPO || !requireProjectWriteAccess(targetPO.project)) return;
  if (!state.launchSelectedPOs) state.launchSelectedPOs = [];
  if (checked && !state.launchSelectedPOs.includes(poId)) state.launchSelectedPOs.push(poId);
  if (!checked) state.launchSelectedPOs = state.launchSelectedPOs.filter(id => id !== poId);

  const po = state.pos.find(item => item.id === poId);
  if (checked && po) {
    (po.parts || []).forEach(pt => {
      const key = po.id + '__' + pt.fgpn;
      if (state.launchSimQty[key] === undefined) state.launchSimQty[key] = Math.max(0, pt.qty - pt.launched);
    });
  }
  renderPageContent();
}

function actionLaunchQtyInput(poId, fgpn, value) {
  const targetPO = state.pos.find(item => item.id === poId);
  if (!targetPO || !requireProjectWriteAccess(targetPO.project)) return;
  const key = poId + '__' + fgpn;
  state.launchSimQty[key] = value === '' ? 0 : Number(value);
  refreshLaunchPlanUI();
}

function refreshLaunchPlanUI() {
  const projectId = state.selectedProjectIdForLe;
  const projectPOs = state.pos.filter(po => po.project === projectId);
  const plan = evaluateLaunchPlan(projectPOs);
  const decision = document.getElementById('launch-decision');
  if (decision) decision.innerHTML = renderLaunchDecision(plan);

  projectPOs.forEach(po => {
    const selected = (state.launchSelectedPOs || []).includes(po.id);
    const parts = po.parts || [{ fgpn: po.fgpn, desc: '-', qty: po.qty, launched: po.launchedQty }];
    parts.forEach(pt => {
      const key = po.id + '__' + pt.fgpn;
      const cellId = 'launch-result-' + key.replace(/[^a-zA-Z0-9_-]/g, '-');
      const cell = document.getElementById(cellId);
      if (cell) cell.innerHTML = renderLaunchLineResult(plan.lineResults[key], selected, pt.launched >= pt.qty);
    });
  });
}

function actionCommitSelectedLaunch() {
  const projectId = state.selectedProjectIdForLe;
  if (!requireProjectWriteAccess(projectId)) return;
  const projectPOs = state.pos.filter(po => po.project === projectId);
  const plan = evaluateLaunchPlan(projectPOs);
  if (!plan.feasible) return;

  const selectedIds = [...state.launchSelectedPOs];
  const lines = [];
  projectPOs.filter(po => selectedIds.includes(po.id)).forEach(po => {
    const parts = po.parts || [];
    parts.forEach(pt => {
      const key = po.id + '__' + pt.fgpn;
      const qty = Number(state.launchSimQty[key]) || 0;
      if (qty > 0) {
        const bomVersion = getActiveBomVersion(projectId, pt.fgpn);
        lines.push({ poId:po.id, fgpn:pt.fgpn, desc:pt.desc, qty, bomVersionId:bomVersion?.id || null, bomVersion:bomVersion?.version || null });
      }
    });
  });

  const planId = `PLAN-${new Date().getFullYear()}-${String((state.savedLaunchPlans || []).length + 7).padStart(3, '0')}`;
  const savedPlan = {
    id: planId,
    projectId,
    selectedIds,
    lines,
    totalQty: plan.totalQty,
    materialDemand: { ...plan.materialDemand },
    createdAt: new Date().toLocaleString('en-GB'),
    pvFile: null,
    meetingDecision: null,
    meetingNotes: '',
    deliveryCode: null,
    deliveryId: null,
    status: 'meeting_pending'
  };
  state.savedLaunchPlans = state.savedLaunchPlans || [];
  state.savedLaunchPlans.unshift(savedPlan);
  state.pendingLaunchAuthorization = savedPlan;
  state.activeWorkspaceTab = 'launch-authorization';
  if (typeof logAudit === 'function') logAudit(`Launch plan saved ${planId}`, '', `${plan.totalQty} units`, selectedIds.join(', '));

function generateWarehouseDeliveryCode() {
  const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  do {
    code = alphabet[Math.floor(Math.random() * alphabet.length)] + alphabet[Math.floor(Math.random() * alphabet.length)] + '-' +
      alphabet[Math.floor(Math.random() * alphabet.length)] + alphabet[Math.floor(Math.random() * alphabet.length)] + alphabet[Math.floor(Math.random() * alphabet.length)];
  } while (state.whDeliveries.some(delivery => delivery.code === code));
  return code;
}

function actionValidateLaunchMeeting() {
  const launch = state.pendingLaunchAuthorization;
  if (!launch || !launch.pvFile) return;
  if (!requireProjectWriteAccess(launch.projectId)) return;
  const decision = document.getElementById('launch-meeting-decision')?.value;
  const notes = document.getElementById('launch-meeting-notes')?.value.trim() || '';
  if (!decision) {
    alert('Select the decision recorded during the launch meeting.');
    return;
  }

  launch.meetingDecision = decision;
  launch.meetingNotes = notes;
  if (decision === 'rejected') {
    launch.status = 'rejected';
    if (typeof logAudit === 'function') logAudit('Launch decision', 'feasible', 'rejected', notes || 'Meeting did not approve launch');
    renderPageContent();
    return;
  }

  const launchedPoIds = new Set();
  launch.lines.forEach(line => {
    const po = state.pos.find(item => item.id === line.poId);
    if (!po) return;
    const previousStatus = po.status;
    const part = (po.parts || []).find(item => item.fgpn === line.fgpn);
    if (part) part.launched = Math.min(part.qty, part.launched + line.qty);
    po.launchedQty = (po.parts || []).reduce((sum, item) => sum + item.launched, 0);
    po.status = 'In Progress';
    po.hasPV = true;
    if (!launchedPoIds.has(po.id) && previousStatus !== 'In Progress') {
      state.poStatusHistory.push({ poId:po.id, from:previousStatus, to:'In Progress', reason:`Approved launch ${line.qty} u with meeting minutes ${launch.pvFile}`, user:currentActor==='lm'?'Karim Benali':'Ahmed Rami', dt:_extNow(), type:'forward' });
    }
    launchedPoIds.add(po.id);
    delete state.launchSimQty[po.id + '__' + line.fgpn];
  });
  syncProjectProgress(launch.projectId);
  launch.finalizedAt = new Date().toLocaleString('en-GB');
  launch.status = 'instruction_pending';
  state.launchSelectedPOs = [];
  if (typeof logAudit === 'function') logAudit('Launch approved and finalized', 'feasible', 'approved', launch.pvFile);
  renderPageContent();
}

function actionSaveWarehouseInstruction() {
  const launch = state.pendingLaunchAuthorization;
  if (!launch || launch.meetingDecision !== 'approved' || !launch.pvFile || launch.deliveryCode) return;
  if (!requireProjectWriteAccess(launch.projectId)) return;

  const requiredTime = document.getElementById('warehouse-required-time')?.value;
  if (!requiredTime) {
    alert('Select the required warehouse delivery date and time.');
    return;
  }

  const matList = [];
  for (const materialId of Object.keys(launch.materialDemand)) {
    const qty = Number(document.getElementById('warehouse-qty-' + materialId)?.value);
    if (!Number.isFinite(qty) || qty <= 0) {
      alert(`Enter a valid delivery quantity for ${materialId}.`);
      return;
    }
    const material = state.stock.find(item => item.id === materialId);
    matList.push({ id: materialId, desc: material ? material.desc : 'Material', qty: Math.ceil(qty) });
  }

  const deliveryCode = generateWarehouseDeliveryCode();
  const deliveryId = 'LAU-' + new Date().getFullYear() + '-' + String(state.whDeliveries.length + 1).padStart(3, '0');
  const expiresAt = Date.now() + (48 * 60 * 60 * 1000);
  const expiresLabel = new Date(expiresAt).toLocaleString('en-GB');
  const requiredDeliveryLabel = new Date(requiredTime).toLocaleString('en-GB');
  const instructionNotes = document.getElementById('warehouse-instruction-notes')?.value.trim() || '';

  state.whDeliveries.unshift({
    id: deliveryId,
    project: launch.projectId,
    poIds: [...launch.selectedIds],
    launchItems: launch.lines.map(line => ({ ...line })),
    code: deliveryCode,
    matList,
    status: 'authorized',
    productionStatus: 'In Progress',
    packagingStatus: 'Waiting Production',
    meetingDecision: launch.meetingDecision,
    meetingMinutesFile: launch.pvFile,
    uploader: null,
    timestamp: new Date().toLocaleString('en-GB'),
    requiredDeliveryTime: requiredTime,
    requiredDeliveryLabel,
    instructionNotes,
    receiver: null,
    pvFile: launch.pvFile,
    expiresAt,
    used: false
  });

  launch.deliveryCode = deliveryCode;
  launch.deliveryId = deliveryId;
  launch.expiresAt = expiresAt;
  launch.expiresLabel = expiresLabel;
  launch.requiredDeliveryTime = requiredTime;
  launch.requiredDeliveryLabel = requiredDeliveryLabel;
  launch.instructionNotes = instructionNotes;
  launch.instructionMaterials = matList;
  launch.instructionSavedAt = new Date().toLocaleString('en-GB');
  launch.status = 'warehouse_released';
  state.lastGeneratedCode = deliveryCode;
  if (typeof logAudit === 'function') logAudit('Warehouse delivery instruction saved', '', deliveryCode, `${deliveryId}; required ${requiredDeliveryLabel}; expires ${expiresLabel}`);
  renderPageContent();
}

function actionLaunchSimulatePart(poId, fgpn) {
  const key = poId + '__' + fgpn;
  const po = state.pos.find(p => p.id === poId);
  if (!po) return;
  const parts = po.parts || [{ fgpn: po.fgpn, desc: '-', qty: po.qty, launched: po.launchedQty }];
  const pt = parts.find(p => p.fgpn === fgpn);
  if (!pt) return;

  const simQty = state.launchSimQty[key] !== undefined ? state.launchSimQty[key] : Math.max(0, pt.qty - pt.launched);
  const boms = getActiveBomLines(po.project, fgpn);

  if (boms.length === 0) {
    state.launchSimResults[key] = { feasible: true, simQty, missing: [] };
    renderPageContent();
    return;
  }

  const missing = [];
  boms.forEach(b => {
    const needed = b.qtyPerUnit * simQty;
    const stk = state.stock.find(s => s.id === b.component);
    const avail = stk ? stk.practical : 0;
    if (needed > avail) missing.push({ id: b.component, needed, avail, diff: Math.round(avail - needed) });
  });

  state.launchSimResults[key] = { feasible: missing.length === 0, simQty, missing };
  renderPageContent();
}

// Launch tab — simulate all parts of a PO
function actionLaunchSimulateAll(poId) {
  const po = state.pos.find(p => p.id === poId);

  const parts = po.parts || [{ fgpn: po.fgpn, desc: '-', qty: po.qty, launched: po.launchedQty }];

    if (state.launchSimQty[key] === undefined) state.launchSimQty[key] = Math.max(0, pt.qty - pt.launched);

}

  const price = parseFloat(document.getElementById('ext-price').value);
  const projectId = document.getElementById('ext-project')?.value || state.pendingPOExtraction.project;
  if (!requireProjectWriteAccess(projectId)) return;
  if (!client.trim() || !fgpn.trim() || !Number.isFinite(qty) || qty <= 0 || !Number.isFinite(price) || price < 0) {
    alert('Confirmation blocked: customer, FGPN, positive quantity, and order value are required.');
    return;
  }
  const blockingFlags = Object.entries(state.pendingPOExtraction.validation || {}).filter(([, status]) => status === 'missing' || status === 'mismatch');
  if (blockingFlags.length) {
    alert(`Confirmation blocked. Resolve validation flags: ${blockingFlags.map(([field, status]) => `${field} (${status})`).join(', ')}.`);
    return;
  }

  const newPoId = state.pendingPOExtraction.id;
  showLoading("Saving Purchase Order...", () => {
    const extracted = state.pendingPOExtraction;
    state.pos.push({
      id: newPoId,
      project: projectId,
      client,
      fgpn,

      week: state.pendingPOExtraction.week,
      status: 'Unplanned',
      price,
      hasPV: false,

      extractionStatus: 'Validated with user review',

function actionSaveClientDelivery() {
  const poId = document.getElementById('cdel-po-select').value;
  const method = document.getElementById('cdel-method').value;
  const qty = Number(document.getElementById('cdel-qty').value);
  const date = document.getElementById('cdel-date').value;
  const notes = document.getElementById('cdel-notes').value.trim();

  const po = state.pos.find(p => p.id === poId);
  if(po && requireProjectWriteAccess(po.project)) {
    const allocated = state.deliveries.filter(d=>d.po===poId).reduce((sum,d)=>sum+d.qty,0);
    const available = Math.max(0, po.qty - allocated);
    if (!Number.isFinite(qty) || qty <= 0 || qty > available || !date) { alert(`Enter a valid quantity between 1 and ${available} and a delivery date.`); return; }
    const methodRef = state.refShipMethods.find(item => item.code === method);
    const priceRecord = state.materialPrices.filter(item => item.fgpn === po.fgpn && item.project === po.project).sort((a,b)=>String(b.effectiveDate).localeCompare(String(a.effectiveDate)))[0];
    const unitPrice = priceRecord ? priceRecord.currentPrice : (po.qty ? po.price / po.qty : 0);
    const deliveryId = 'DEL-' + new Date().getFullYear() + '-' + String(state.deliveries.length + 19).padStart(3,'0');
    state.deliveries.unshift({
      id: deliveryId,
      project: po.project,
      po: poId,
      fgpn: po.fgpn,
      description: po.parts?.[0]?.desc || '-',
      client: po.client,
      qty,
      method,
      transportCost: methodRef?.cost || 0,
      date,
      week: po.week,
      status: 'Pending',
      unitPrice,
      value: qty * unitPrice,
      notes,
      instructionFile: `customer_delivery_instruction_${deliveryId}.pdf`
    });
    logAudit(`Customer delivery instruction created ${deliveryId}`, poId, `${qty} u | ${method} | ${date}`, `Instruction ${deliveryId} awaiting confirmation`);
  }
  closeModal();
  renderPageContent();
}

  if (!delivery) {
    if (typeof logAudit === 'function') logAudit('Warehouse code access failed', enteredCode, 'invalid', 'Code not found');
    alert('Invalid delivery code. Check the code provided by the Launch Engineer.');
    return;
  }
  if (delivery.used) {
    if (typeof logAudit === 'function') logAudit('Warehouse code access failed', enteredCode, 'already used', delivery.id);
    alert('This code has already been used and cannot open the delivery details again.');
    return;
  }
  if (delivery.expiresAt && delivery.expiresAt <= Date.now()) {
    if (typeof logAudit === 'function') logAudit('Warehouse code access failed', enteredCode, 'expired', delivery.id);
    alert('This code has expired. Please contact the Launch Engineer to generate a new delivery instruction.');
    return;
  }
  if (delivery.status !== 'authorized') {
    alert('This delivery instruction is not available for warehouse execution.');
    return;
  }

  showLoading('Loading authorized warehouse instruction...', () => {
    state.activeWhDeliveryId = delivery.id;
    state.wtlCodeValidated = true;
    delivery.accessedAt = new Date().toLocaleString('en-GB');
    if (typeof logAudit === 'function') logAudit('Warehouse code accessed', enteredCode, delivery.id, 'successful');
    navigateTo('wtl-delivery');
  });
}

  const mp = state.materialPrices.find(m => m.id === matId);

    if (!Number.isFinite(newPrice) || newPrice < 0 || !effectiveDate) { alert('A valid non-negative price and effective date are required.'); return; }
    const oldPrice = mp.currentPrice;
    mp.status = 'superseded';
    const newRecord = { ...mp, id:`PRICE-${String(state.materialPrices.length+1).padStart(3,'0')}`, currentPrice:newPrice, effectiveDate, status:'active' };
    state.materialPrices.push(newRecord);
    state.priceHistory.unshift({
      id: `PRICE-H-${String(state.priceHistory.length+1).padStart(3,'0')}`,
      priceId: newRecord.id,
      fgpn: mp.fgpn,
      project: mp.project,
      prev: oldPrice,
      next: newPrice,
      effectiveDate,
      dt: _extNow(),
      user: currentActor === 'lm' ? 'Karim Benali' : 'Ahmed Rami'
    });
    logAudit(`FGPN price changed ${mp.fgpn}`, oldPrice, newPrice, `Effective ${effectiveDate}; prior record ${matId} preserved`);
    alert(`Price saved. Previous: ${oldPrice.toFixed(2)} € -> New: ${newPrice.toFixed(2)} €.`);
  }
  closeModal();
  renderPageContent();
}

function actionSaveProject(existingId) {
  const id = document.getElementById('project-id').value;
  const name = document.getElementById('project-name').value.trim();
  const client = document.getElementById('project-client').value;
  const status = document.getElementById('project-status').value;
  const existingProject = existingId ? state.projects.find(p => p.id === existingId) : null;
  const engineer = existingProject ? existingProject.engineer : currentActor === 'le' ? 'Ahmed Rami' : document.getElementById('project-engineer').value;
  const manager = currentActor === 'lm' ? 'Karim Benali' : document.getElementById('project-manager').value;
  if (!name || !client || !engineer || !manager) {
    alert('Project name, customer, Launch Engineer, and Launch Manager are required.');
    return;
  }

  if (existingId) {
    if (!requireProjectMasterAccess(existingId)) return;
    const project = existingProject;
    if (!project) return;
    const before = `${project.name} | ${project.client} | ${project.status} | ${project.engineer} | ${project.manager}`;
    Object.assign(project, { name, client, status, engineer, manager });
    logAudit(`Project updated ${existingId}`, before, `${name} | ${client} | ${status} | ${engineer} | ${manager}`, 'Owner-authorized project update');
  } else {
    if (!['admin', 'lm'].includes(currentActor)) {
      alert('Only Launch Managers and System Administrators can create projects.');
      return;
    }
    const project = { id, name, client, status, engineer, manager, pos: 0 };
    if (!canEditProject(project)) {
      alert('A new project must be assigned to you.');
      return;
    }
    state.projects.push(project);
    logAudit(`Project created ${id}`, '-', `${name} | ${client} | ${engineer} | ${manager}`, 'New project before PO submission');
  }
  state.users.forEach(user => {
    user.projects = state.projects.filter(p => p.engineer === user.name || p.manager === user.name).length;
  });
  closeModal();
  renderPageContent();
}

function actionDeleteProject(projectId) {
  if (!requireProjectMasterAccess(projectId)) return;
  const project = state.projects.find(p => p.id === projectId);
  if (!project) return;
  const linkedPOs = state.pos.filter(po => po.project === projectId);
  if (linkedPOs.length) {
    alert(`Cannot delete ${projectId}. It has ${linkedPOs.length} linked purchase order(s). Remove is blocked to preserve PO and audit history.`);
    return;
  }
  if (!confirm(`Delete ${projectId} - ${project.name}? This project has no linked purchase orders.`)) return;
  state.projects = state.projects.filter(p => p.id !== projectId);
  state.users.forEach(user => {
    user.projects = state.projects.filter(p => p.engineer === user.name || p.manager === user.name).length;
  });
  logAudit(`Project deleted ${projectId}`, project.name, '-', 'Owner-authorized deletion with no linked POs');
  state.selectedProjectIdForLe = null;
  closeModal();
  renderPageContent();
}

// ── Helper: compute current timestamp label (short French format) ──
function _extNow() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── Core audit logger (feature #9) ──
function logAudit(action, oldValue, newValue, reason) {
  state.auditLog.unshift({
    id: 'AUD-' + (state.auditLog.length + 1),
    user: state.currentUserName || 'Ahmed Rami',
    role: state.currentUserRole || 'Launch Engineer',
    dt: _extNow(),
    action,
    oldValue: (oldValue === undefined || oldValue === null) ? '' : String(oldValue),
    newValue: (newValue === undefined || newValue === null) ? '' : String(newValue),
    reason: reason || ''
  });
}

function actionAdvancePOStatus(poId) {
  alert('PO status is system-controlled and changes only when the required launch and delivery evidence is verified.');
  return;
  const po = state.pos.find(p => p.id === poId);
  if (!po || !requireProjectWriteAccess(po.project)) return;
  const sequence = ['Unplanned', 'In Progress', 'Done', 'Packaged', 'Delivered'];
  const index = sequence.indexOf(po.status);
  if (index < 0 || index >= sequence.length - 1) return;
  const next = sequence[index + 1];
  if (next === 'Done' && po.launchedQty < po.qty) {
    alert(`Cannot move to Done. ${po.qty - po.launchedQty} unit(s) are not yet launched into production.`);
    return;
  }
  if (next === 'Delivered') {
    const confirmedQty = state.deliveries.filter(d => d.po === poId && d.status === 'Delivered').reduce((sum, d) => sum + d.qty, 0);
    if (confirmedQty < po.qty) {
      alert(`Cannot move to Delivered. Confirmed customer deliveries cover ${confirmedQty} of ${po.qty} units. Record delivery confirmation for the remaining ${po.qty - confirmedQty} units first.`);
      return;
    }
  }
  const previous = po.status;
  po.status = next;
  syncProjectProgress(po.project);
  const user = currentActor === 'lm' ? 'Karim Benali' : 'Ahmed Rami';
  state.poStatusHistory.push({ poId, from: previous, to: next, reason: 'Authorized forward workflow transition', user, dt: _extNow(), type: 'forward' });
  logAudit(`PO status advanced ${poId}`, previous, next, 'Sequential workflow transition');
  renderPageContent();
}

function showRollbackPOStatusModal(poId) {
  alert('Manual PO status rollback is disabled. Correct or reject the underlying launch, warehouse, shipment, or delivery evidence instead.');

  if (currentActor !== 'le' && currentActor !== 'lm') {

function actionConfirmPORollback(poId) {
  alert('Manual PO status rollback is disabled.');
  return;
  const targetPO = state.pos.find(item => item.id === poId);
  if (!targetPO || !requireProjectWriteAccess(targetPO.project)) return;
  const newStatus = document.getElementById('rb-new-status').value;
  const reason = document.getElementById('rb-reason').value.trim();
  // Validation rule #10: no rollback without justification
  if (!reason) {
    alert("A justification is mandatory to perform a rollback.");
    return;
  }
  const po = state.pos.find(p => p.id === poId);
  if (!po) return;
  const oldStatus = po.status;
  po.status = newStatus;
  state.poStatusHistory.push({
    poId,
    from: oldStatus,
    to: newStatus,
    reason,
    dt: _extNow(),
    user: currentActor === 'lm' ? 'Karim Benali' : 'Ahmed Rami',
    type: 'rollback'
  });
  logAudit(`PO Rollback ${poId}`, oldStatus, newStatus, reason);
  closeModal();
  alert(`Rollback performed: ${poId} changed from ${oldStatus} to ${newStatus}.`);
  renderPageContent();
}

function actionApproveSignedReceipt(delId) {
  const del = state.whDeliveries.find(d => d.id === delId);
  if (!del) return;
  if (!requireProjectWriteAccess(del.project)) return;
  const fileInput = document.getElementById('sr-file');
  const file = fileInput && fileInput.files[0];
  const filename = file ? file.name : `receipt_signed_${delId}.pdf`;

  state.signedReceiptApprovals.unshift({
    delId,
    approver: state.currentUserName || 'Ahmed Rami',
    approvalDate: _extNow(),
    document: filename,
    result: 'approved',
    rejectionReason: null
  });

  closeModal();
  showLoading("Approving & deducting stock...", () => {
    del.status = 'validated';
    // Validation rule #10: stock update only after approval
    del.matList.forEach(m => {
      const mat = state.stock.find(s => s.id === m.id);
      if (mat) {
        const before = mat.practical;
        mat.practical = Math.max(0, mat.practical - m.qty);
        state.stockMovements.unshift({
          id: 'MOV-' + Date.now() + '-' + m.id,
          dt: _extNow(),
          matId: m.id,
          desc: mat.desc,
          type: 'Warehouse to manufacturing',
          qty: -m.qty,
          before,
          after: mat.practical,
          operator: state.currentUserName || 'Ahmed Rami',
          deliveryId: delId,
          document: filename,
          uploader: del.uploader,
          receiver: del.receiver,
          signedUploadedAt: del.signedUploadedAt
        });
      }
    });
    syncProjectProgress(del.project);
    logAudit(`Signed receipt approved ${delId}`, 'signed_pending', 'approved', `Doc: ${filename}`);
    renderPageContent();
  });
}

  const del = state.whDeliveries.find(d => d.id === delId);
  if (!del) return;
  if (!requireProjectWriteAccess(del.project)) return;

function actionSaveDeliveryConfirmation(delId) {
  const method = document.getElementById('dc-method').value;
  const confirmationDate = document.getElementById('dc-date').value;
  const confirmingPerson = document.getElementById('dc-person').value.trim();
  const notes = document.getElementById('dc-notes').value.trim();
  const fileInput = document.getElementById('dc-file');
  const file = fileInput && fileInput.files[0];
  const attachment = file ? file.name : null;

  // Validation rule #10: no Delivered status without confirmation proof
  if (!method) {
    alert("Please select a confirmation method.");
    return;
  }
  if (!attachment) {
    alert("Proof (file) is mandatory to change to Delivered status.");
    return;
  }
  if (!confirmationDate || !confirmingPerson) { alert("Confirmation date and confirming person's name are required."); return; }

  const del = state.deliveries.find(d => d.id === delId);
  if (!del) return;
  if (!requireProjectWriteAccess(del.project || state.pos.find(p=>p.id===del.po)?.project)) return;

  state.deliveryConfirmations.unshift({
    delId,
    po: del.po,
    client: del.client,
    method,
    attachment,
    notes,
    confirmer: confirmingPerson,
    recordedBy: currentActor === 'lm' ? 'Karim Benali' : 'Ahmed Rami',
    confirmationDate,
    recordedAt: _extNow()
  });

  closeModal();
  showLoading("Confirming & updating...", () => {
    del.status = 'Delivered';
    del.confirmationDate = confirmationDate;
    del.confirmationMethod = method;
    del.confirmer = confirmingPerson;
    del.proof = attachment;
    const po = state.pos.find(p => p.id === del.po);
    if (po) {
      const confirmedQty = state.deliveries.filter(d => d.po === po.id && d.status === 'Delivered').reduce((sum,d)=>sum+d.qty,0);
      state.caJulReal += Number(del.value || 0) + Number(del.transportCost || 0);
      if (confirmedQty >= po.qty && po.status !== 'Delivered') {
        const previous = po.status;
        po.status = 'Delivered';
        state.poStatusHistory.push({ poId: po.id, from: previous, to: 'Delivered', reason: `Cumulative confirmed delivery reached ${confirmedQty}/${po.qty} units`, user: currentActor === 'lm' ? 'Karim Benali' : 'Ahmed Rami', dt: _extNow(), type: 'forward' });
      }
      syncProjectProgress(po.project);
    }
    logAudit(`Delivery confirmed ${delId}`, 'Pending', 'Delivered', `${del.qty} u · ${method} · ${confirmingPerson} · ${attachment}`);
    renderPageContent();
  });
}

function actionGenerateFutureLaunchDoc() {
  const now = _extNow();
  const criticals = state.stock
    .filter(s => s.practical <= s.threshold)
    .map(s => `${s.id} (manque ${s.threshold - s.practical} u)`)
    .join(', ') || 'None';
  const totalPractical = state.stock.reduce((a, s) => a + s.practical, 0);
  const totalTransit = state.stock.reduce((a, s) => a + s.transit, 0);
  const doc = {
    id: 'DOC-LAUNCH-' + (state.simulationDocuments.length + 1).toString().padStart(3, '0'),
    simulationDate: now,
    expectedStock: totalPractical,
    transitStock: totalTransit,
    missingMaterials: criticals,
    feasibleLaunchDate: 'Wk. 30 (estimation)',
    generatedBy: state.currentUserName || 'Ahmed Rami',
    filename: `draft_launch_document_${Date.now()}.pdf`
  };
  state.simulationDocuments.unshift(doc);
  logAudit(`Future Launch Document generated ${doc.id}`, '', doc.feasibleLaunchDate, `Missing: ${criticals}`);
  alert(`Document Draft Launch generated: ${doc.filename}\n\n• Simulation date: ${doc.simulationDate}\n• Expected Stock: ${doc.expectedStock} u\n• Transit: ${doc.transitStock} u\n• Shortfalls: ${criticals}\n• Feasible Date: ${doc.feasibleLaunchDate}\n\nSaved in audit history (feature #8).`);
  renderPageContent();
}

function runDynamicAttribute(control, attribute, event) {
  const property = attribute.toLowerCase();
  if (!control || typeof control[property] === 'function') return;
  const code = control.getAttribute(attribute);
  if (!code || control.disabled) return;
  try {
    (function(event) { eval(code); }).call(control, event);
  } catch (error) {
    console.error(`Dynamic ${attribute} action failed`, error);
  }
}

function installDynamicActionDelegation() {
  ['sidebar', 'main-content'].forEach(id => {
    const surface = document.getElementById(id);
    if (!surface || surface.dataset.actionsBound === 'true') return;
    surface.dataset.actionsBound = 'true';
    surface.addEventListener('click', event => runDynamicAttribute(event.target.closest('[onclick]'), 'onclick', event));
    surface.addEventListener('input', event => runDynamicAttribute(event.target, 'oninput', event));
    surface.addEventListener('change', event => runDynamicAttribute(event.target, 'onchange', event));
  });
}
